<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Chatbot - Premium Experience</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body id="body">
    <div class="app-container">
      <div class="accent-line"></div>

      <!-- Header -->
      <div class="header">
        <span>
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" class="f1-logo" alt="F1 Logo" />
          F1 Assistant
        </span>
        <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
      </div>

      <!-- Messages Area -->
      <div id="messages">
        <!-- Messages will appear here -->
      </div>

      <!-- Input Area -->
      <div class="input-container">
        <input id="input" type="text" placeholder="Converse comigo sobre a F1..." />
        <button onclick="sendMessage()" class="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
